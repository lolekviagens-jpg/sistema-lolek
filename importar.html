function normNome(s) {
  return (s || '').toLowerCase()
    .normalize('NFD').replace(/\p{Diacritic}/gu, '')
    .replace(/\s+/g, ' ').trim();
}

document.getElementById('btn-importar').addEventListener('click', function() {
  this.disabled = true;
  this.textContent = '⏳ Importando…';

  let existentes = [];
  try { existentes = JSON.parse(localStorage.getItem('lolek_clientes') || '[]'); } catch {}

  const cpfSet  = new Set();
  const nomeSet = new Set();
  existentes.forEach(c => {
    const cpf = (c.cpf || '').replace(/\D/g, '');
    if (cpf.length > 5) cpfSet.add(cpf);
    nomeSet.add(normNome(c.nome));
  });

  let adicionados = 0, ignorados = 0;
  NOVOS.forEach(c => {
    const cpf  = (c.cpf || '').replace(/\D/g, '');
    const nome = normNome(c.nome);
    if ((cpf.length > 5 && cpfSet.has(cpf)) || nomeSet.has(nome)) {
      ignorados++;
    } else {
      existentes.push(c);
      if (cpf.length > 5) cpfSet.add(cpf);
      nomeSet.add(nome);
      adicionados++;
    }
  });

  try {
    localStorage.setItem('lolek_clientes', JSON.stringify(existentes));
    const res = document.getElementById('resultado');
    res.className = 'resultado ok';
    res.style.display = 'block';
    res.innerHTML = '<strong>✓ Importação concluída!</strong><br>' +
      adicionados + ' passageiros adicionados<br>' +
      ignorados   + ' já existiam (ignorados)<br>' +
      '<strong>Total em Clientes: ' + existentes.length + '</strong>';
    this.textContent = '✓ Concluído';
    this.style.background = '#22c55e';
  } catch(e) {
    const res = document.getElementById('resultado');
    res.className = 'resultado err';
    res.style.display = 'block';
    res.textContent = 'Erro ao salvar: ' + e.message;
    this.disabled = false;
    this.textContent = 'Importar agora';
  }
});
